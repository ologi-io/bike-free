<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Bike Free global high scores.">
    <title>Bike Free High Scores</title>
    <link rel="stylesheet" href="/styles/site.css">
  </head>
  <body class="leaderboard-page">
    <main class="leaderboard-shell">
      <header class="leaderboard-header">
        <a class="play-link" href="/">Play</a>
        <div>
          <p class="eyebrow">Bike Free</p>
          <h1>High Scores</h1>
        </div>
        <div id="account"></div>
      </header>

      <section class="score-panel">
        <table>
          <thead>
            <tr>
              <th>Rank</th>
              <th>Rider</th>
              <th>Country</th>
              <th>Distance</th>
            </tr>
          </thead>
          <tbody id="scores">
            <tr><td colspan="4">Loading...</td></tr>
          </tbody>
        </table>
      </section>
    </main>
    <script src="/js/leaderboard.js"></script>
  </body>
</html>
