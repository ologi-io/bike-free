<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=0">
    <meta name="description" content="Play Bike Free, a retro downhill mountain biking game.">
    <title>Bike Free | Retro MTB Video Game</title>
    <link rel="stylesheet" href="/game/css/normalize.css">
    <link rel="stylesheet" href="/game/css/main.css">
    <link rel="stylesheet" href="/game/css/skifree.css">
    <link rel="stylesheet" href="/styles/site.css">
    <script src="/game/js/vendor/modernizr-2.6.2.min.js"></script>
  </head>
  <body class="game-page">
    <header class="game-header" aria-live="polite">
      <div class="game-brand">
        <span class="brand-rider" aria-hidden="true"></span>
        <div>
          <strong>Bike Free</strong>
          <span id="score-status">Checking score storage...</span>
        </div>
      </div>
      <div class="score-chip">
        <span>/\</span>
        <span>Travelled: <b id="travelled-distance">0.0m</b></span>
        <span>Best: <b id="best-distance">0.0m</b></span>
        <span>*</span>
      </div>
      <div class="game-header-actions">
        <div id="game-account"></div>
        <a href="/leaderboard">[T] High Scores</a>
      </div>
    </header>
    <main class="game-frame">
      <canvas id="skifree-canvas" tabindex="0"></canvas>
    </main>
    <div class="score-modal-backdrop" id="score-modal" hidden>
      <div class="score-modal-panel" role="dialog" aria-modal="true" aria-labelledby="score-modal-title">
        <p class="eyebrow">Game Over</p>
        <h2 id="score-modal-title">Submit your score</h2>
        <p class="score-modal-distance">Distance: <b id="score-modal-distance">0.0m</b></p>
        <p id="score-modal-message">Sign in to save this run.</p>
        <div class="score-modal-actions" id="score-modal-actions"></div>
      </div>
    </div>
    <script src="/game/js/vendor/jquery-1.8.3.min.js"></script>
    <script src="/game/js/vendor/sugar-1.3.7.min.js"></script>
    <script src="/js/score-client.js"></script>
    <script defer src="/game/dist/skifree.js"></script>
  </body>
</html>
